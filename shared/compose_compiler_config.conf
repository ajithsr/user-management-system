# Compose compiler stability configuration
# Classes listed here are treated as @Stable by the Compose compiler, enabling
# skip optimisation for any data class that contains them.
#
# kotlinx.datetime.Instant is immutable and value-like but lives in an external
# library that the Compose compiler cannot inspect. Without this entry the
# compiler conservatively marks every class containing an Instant field
# (User, UserFeedItem, …) as unstable, which disables LazyColumn item-skip.
kotlinx.datetime.Instant
